<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apps — Neder Hayden</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; }
    p { color: #6e6e73; margin-bottom: 32px; }
    .app-card {
      background: #fff;
      border-radius: 16px;
      padding: 24px 28px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      color: inherit;
    }
    .app-card span { font-size: 2.4rem; }
    .app-card div h2 { font-size: 1rem; font-weight: 600; }
    .app-card div p { font-size: .85rem; color: #6e6e73; margin: 0; }
    footer { margin-top: 48px; font-size: .8rem; color: #6e6e73; }
  </style>
</head>
<body>
  <h1>Apps by Neder Hayden</h1>
  <p>Políticas de privacidade e suporte</p>

  <a class="app-card" href="privacy.html">
    <span>💧</span>
    <div>
      <h2>Beber Água</h2>
      <p>Privacidade · Suporte</p>
    </div>
  </a>

  <footer>&copy; 2026 Neder Hayden</footer>
